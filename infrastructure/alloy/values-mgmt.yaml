# ============================================================================
# Grafana Alloy — values for the MGMT cluster
# ----------------------------------------------------------------------------
# Ships to Loki/Mimir IN-CLUSTER (no LB hop): cheaper + lower latency.
# external_labels.cluster=mgmt so Grafana can filter by source cluster.
#
# Pipelines:
#   1) Pod logs → Loki  (with namespace/pod/container/app labels)
#   2) Kubelet metrics (HTTPS, port 10250) → Mimir
#   3) cAdvisor metrics (HTTPS, /metrics/cadvisor) → Mimir
# ============================================================================

controller:
  type: daemonset
  replicas: 1

alloy:
  uiPathPrefix: /
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

  configMap:
    create: true
    content: |
      // =====================================================================
      // LOGS — pod logs with Kubernetes metadata labels
      // =====================================================================

      // Discover all pods and enrich with K8s metadata labels.
      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // Drop pods that are not running (completed/evicted).
        rule {
          source_labels = ["__meta_kubernetes_pod_phase"]
          regex         = "Pending|Succeeded|Failed|Completed"
          action        = "drop"
        }

        // Inject namespace, pod, container, app labels into every log line.
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        // app label from the standard k8s label (set on all hms-* pods).
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
          regex         = "(.+)"
          replacement   = "$1"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          // In-cluster Loki gateway.
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
        external_labels = {
          cluster = "mgmt",
        }
      }

      // =====================================================================
      // METRICS — kubelet + cAdvisor
      // =====================================================================

      discovery.kubernetes "nodes" {
        role = "node"
      }

      // Relabel nodes to carry the node name as a label on every metric.
      discovery.relabel "nodes" {
        targets = discovery.kubernetes.nodes.targets

        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
        }
        // Kubelet HTTPS endpoint — port 10250.
        rule {
          source_labels = ["__address__"]
          regex         = "(.+):.*"
          replacement   = "$1:10250"
          target_label  = "__address__"
        }
      }

      // Kubelet /metrics (resource usage, runtime info).
      prometheus.scrape "kubelet" {
        targets    = discovery.relabel.nodes.output
        scheme     = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.default.receiver]
      }

      // cAdvisor /metrics/cadvisor (container CPU/mem/net/disk).
      prometheus.scrape "cadvisor" {
        targets      = discovery.relabel.nodes.output
        scheme       = "https"
        metrics_path = "/metrics/cadvisor"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.default.receiver]
      }

      prometheus.remote_write "default" {
        endpoint {
          // In-cluster Mimir (ClusterIP service, replaced mimir-nginx).
          url = "http://mimir.monitoring.svc.cluster.local/api/v1/push"
        }
        external_labels = {
          cluster = "mgmt",
        }
      }

# Chart default ClusterRole includes nodes/metrics, nodes/proxy, pods — sufficient
# for kubelet + cAdvisor scraping without extra RBAC.
serviceAccount:
  create: true
