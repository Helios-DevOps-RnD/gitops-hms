# ============================================================================
# Grafana Alloy — values for the STAGING cluster
# ----------------------------------------------------------------------------
# Ships ACROSS VNet peering to mgmt cluster Loki + Mimir internal LBs.
#
# After mimir-lb sync, get the new IP:
#   kubectl --context devops-aks-mgmt -n monitoring get svc mimir-lb
# Update MIMIR_URL below if different from 10.0.1.9.
# ============================================================================

controller:
  type: daemonset

alloy:
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 300m, memory: 384Mi }

  configMap:
    create: true
    content: |
      // =====================================================================
      // LOGS — pod logs with Kubernetes metadata labels
      // =====================================================================

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_phase"]
          regex         = "Pending|Succeeded|Failed|Completed"
          action        = "drop"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
          regex         = "(.+)"
          replacement   = "$1"
        }
      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          // loki-gateway internal LB on mgmt.
          url = "http://10.0.1.8/loki/api/v1/push"
        }
        external_labels = {
          cluster = "staging",
        }
      }

      // =====================================================================
      // METRICS — kubelet + cAdvisor
      // =====================================================================

      discovery.kubernetes "nodes" {
        role = "node"
      }

      discovery.relabel "nodes" {
        targets = discovery.kubernetes.nodes.targets

        rule {
          source_labels = ["__meta_kubernetes_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__address__"]
          regex         = "(.+):.*"
          replacement   = "$1:10250"
          target_label  = "__address__"
        }
      }

      prometheus.scrape "kubelet" {
        targets    = discovery.relabel.nodes.output
        scheme     = "https"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.default.receiver]
      }

      prometheus.scrape "cadvisor" {
        targets      = discovery.relabel.nodes.output
        scheme       = "https"
        metrics_path = "/metrics/cadvisor"
        bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        tls_config {
          insecure_skip_verify = true
        }
        forward_to = [prometheus.remote_write.default.receiver]
      }

      prometheus.remote_write "default" {
        endpoint {
          // mimir-lb internal LB on mgmt — update IP if mimir-lb got a new address.
          url = "http://10.0.1.9/api/v1/push"
        }
        external_labels = {
          cluster = "staging",
        }
      }

serviceAccount:
  create: true
