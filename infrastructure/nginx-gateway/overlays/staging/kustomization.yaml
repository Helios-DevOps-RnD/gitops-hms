apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NGINX Gateway Fabric v2.5.1 — pinned here.
#   1) Kubernetes Gateway API standard CRDs (vendored by NGF for version compat)
#   2) NGF's own CRDs
#   3) NGF controller deployment (creates the `nginx-gateway` namespace,
#      Deployment, Service, RBAC)
#   4) Our local base — Gateway only (GatewayClass comes from NGF's deploy.yaml above)
resources:
  - https://github.com/nginx/nginx-gateway-fabric.git//config/crd/gateway-api/standard?ref=v2.5.1
  - https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v2.5.1/deploy/crds.yaml
  - https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v2.5.1/deploy/default/deploy.yaml
  - ../../base

# NGF v2.x architecture: control plane (Service `nginx-gateway` in namespace
# `nginx-gateway`) stays ClusterIP — it's just admin/webhook endpoints. The
# DATA PLANE is auto-spawned per Gateway resource in the same namespace as
# the Gateway, with type=LoadBalancer by default (configured by the upstream
# NginxProxy). For our `hms-gateway` Gateway, NGF creates Service
# `hms-gateway-nginx` in namespace `hms` automatically — that's the public
# LB that Cloudflare proxies onto. No Service patch needed here.
patches:
  - path: patch-gateway.yaml
    target:
      kind: Gateway
      name: hms-gateway
      namespace: hms

# `commonLabels` was deprecated by kustomize. The new `labels` block lets us
# control whether the labels also leak into selectors — which we MUST disable,
# otherwise the upstream NGF Deployment's matchLabels would change and break
# (selectors are immutable once a Deployment exists).
labels:
  - pairs:
      env: staging
    includeSelectors: false
    includeTemplates: false
