apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NGINX Gateway Fabric v2.5.1 — pinned here.
#   1) Kubernetes Gateway API standard CRDs (vendored by NGF for version compat)
#   2) NGF's own CRDs
#   3) NGF controller deployment (creates the `nginx-gateway` namespace,
#      Deployment, Service, RBAC)
#   4) Our local base — GatewayClass + Gateway
resources:
  - https://github.com/nginx/nginx-gateway-fabric.git//config/crd/gateway-api/standard?ref=v2.5.1
  - https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v2.5.1/deploy/crds.yaml
  - https://raw.githubusercontent.com/nginx/nginx-gateway-fabric/v2.5.1/deploy/default/deploy.yaml
  - ../../base

# Patch the controller Service to a PUBLIC Azure LoadBalancer. Cloudflare
# proxies in front and enforces VPN-only access via an IP Access Rule on the
# staging hostnames — Cloudflare edge cannot reach an Azure internal LB, so
# the origin has to be public. The IP restriction happens at Cloudflare.
# Matches the production overlay (same pattern, different Cloudflare rule).
patches:
  - path: patch-service-public-lb.yaml
    target:
      kind: Service
      name: nginx-gateway
      namespace: nginx-gateway
  - path: patch-gateway.yaml
    target:
      kind: Gateway
      name: hms-gateway
      namespace: hms

commonLabels:
  env: staging
