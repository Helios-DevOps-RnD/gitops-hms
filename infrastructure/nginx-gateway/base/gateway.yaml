# ============================================================================
# Base Gateway — one HTTP listener on :80 in the `hms` namespace.
# Overlays patch this:
#   - staging:    HTTP, public Azure LB, Cloudflare proxy with VPN IP Access Rule
#   - production: HTTP, public Azure LB, Cloudflare proxy (TLS termination at edge)
# ============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: hms-gateway
  namespace: hms
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
