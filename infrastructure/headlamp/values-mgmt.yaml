# ============================================================================
# Headlamp — values for the MGMT cluster (chart: headlamp/headlamp)
# ----------------------------------------------------------------------------
# Lightweight Kubernetes UI running in-cluster on mgmt.
# Access: internal LB IP over P2S VPN at http://<10.0.x.x>:4466
# In-cluster mode: uses its own ServiceAccount token (read-only via view ClusterRole).
# First login: kubectl -n headlamp create token headlamp --duration=8760h
# ============================================================================

replicaCount: 1

resources:
  requests: { cpu: 50m, memory: 128Mi }
  limits:   { cpu: 200m, memory: 256Mi }

service:
  type: LoadBalancer
  port: 4466
  annotations:
    # Internal LB — only reachable from within the VNet (via P2S VPN).
    # After sync: kubectl -n headlamp get svc headlamp → IP in 10.0.x.x range
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"

clusterRoleBinding:
  create: true
  clusterRoleName: view   # read-only access — cannot delete, edit, or exec
