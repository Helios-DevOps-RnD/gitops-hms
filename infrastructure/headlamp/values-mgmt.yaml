# ============================================================================
# Headlamp — values for the MGMT cluster (chart: headlamp/headlamp)
# ----------------------------------------------------------------------------
# Lightweight read-only Kubernetes UI for team visibility.
# Access: connect to P2S VPN, then open http://<INTERNAL-LB-IP>:4466
#
# First login:
#   kubectl --context devops-aks-mgmt -n headlamp \
#     create token headlamp --duration=8760h
#   Paste the token into the Headlamp browser prompt.
# ============================================================================

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

service:
  type: LoadBalancer
  port: 4466
  annotations:
    # Internal LB — only reachable from within the VNet (P2S VPN).
    # After ArgoCD sync: kubectl -n headlamp get svc headlamp → IP 10.0.x.x
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"

# Let Headlamp create its own ServiceAccount + ClusterRoleBinding (view only).
clusterRoleBinding:
  create: true

# Run in in-cluster mode — uses the pod's own ServiceAccount token
# to talk to the Kubernetes API. No kubeconfig needed.
env: []

# Optional: pin to a specific Headlamp version for reproducibility.
# Check latest at: https://github.com/headlamp-k8s/headlamp/releases
image:
  pullPolicy: IfNotPresent
