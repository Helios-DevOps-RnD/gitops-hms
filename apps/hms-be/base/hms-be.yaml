# ============================================================================
# hms-be — Express Node 20 backend.
# Image:  registry.hms.internal/hms/be:<git-sha>  (overlay sets the tag)
# Port:   3001
# Config sources (post-split):
#   - hms-be-config    ConfigMap, base + per-env patch.
#                      Non-secret runtime knobs: PGPORT, PGSSL, PGDATABASE,
#                      FIREBASE_STORAGE_BUCKET.
#   - hms-be-secret    SealedSecret per overlay. envFrom only.
#                      Real credentials: PGHOST, PGUSER, PGPASSWORD.
#   - hms-be-firebase  SealedSecret per overlay. volumeMount via subPath.
#                      firebase-key.json (Firebase service account).
# Both SealedSecrets are in apps/hms-be/overlays/<env>/sealed-secret.yaml
# (one file, two docs separated by `---`).
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-be
  namespace: hms
  labels:
    app.kubernetes.io/name: hms-be
    app.kubernetes.io/part-of: hms
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hms-be
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hms-be
        app.kubernetes.io/part-of: hms
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: hms-be
          image: registry.hms.internal/hms/be:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            # The app code reads this path to load the Firebase service account.
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/firebase-key.json
          envFrom:
            # Non-secret config: PGPORT, PGSSL, PGDATABASE, FIREBASE_STORAGE_BUCKET
            - configMapRef:
                name: hms-be-config
            # Real credentials: PGHOST, PGUSER, PGPASSWORD
            - secretRef:
                name: hms-be-secret
          volumeMounts:
            - name: firebase-key
              mountPath: /app/firebase-key.json
              subPath: firebase-key.json
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: firebase-key
          secret:
            # Separate SealedSecret (hms-be-firebase) — keeps the binary JSON
            # rotation independent from env-var rotation in Jenkins.
            secretName: hms-be-firebase
            items:
              - key: firebase-key.json
                path: firebase-key.json
---
apiVersion: v1
kind: Service
metadata:
  name: hms-be
  namespace: hms
  labels:
    app.kubernetes.io/name: hms-be
    app.kubernetes.io/part-of: hms
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hms-be
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
