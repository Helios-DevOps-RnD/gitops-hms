# ============================================================================
# Non-secret runtime config for hms-be. Overlays patch values per env.
# Why ConfigMap (not SealedSecret) for these:
#   - PGPORT/PGSSL/PGDATABASE: not credentials. Leaking them = nothing.
#   - FIREBASE_STORAGE_BUCKET: bucket name is reachable; security model is
#     enforced by Firebase Security Rules + the firebase-key.json (which DOES
#     stay in SealedSecret), not by hiding the bucket name.
# What stays in SealedSecret per overlay:
#   - PGHOST / PGUSER / PGPASSWORD       (credentials + infra topology)
#   - firebase-key.json                  (service-account, full Firebase auth)
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: hms-be-config
  namespace: hms
data:
  PGPORT: "5432"
  PGSSL: "true"
  PGDATABASE: "placeholder"
  FIREBASE_STORAGE_BUCKET: "placeholder"
