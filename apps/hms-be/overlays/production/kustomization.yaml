apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hms

resources:
  - ../../base
  - httproute.yaml
  # SealedSecret for PGPASSWORD + firebase-key.json. Sealed against prod
  # cluster cert (prod-pub.pem in Jenkins creds) — staging-sealed data will
  # NOT decrypt here.
  - sealed-secret.yaml

patches:
  - path: patch-image.yaml
    target:
      kind: Deployment
      name: hms-be
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: hms-be

commonLabels:
  env: production
