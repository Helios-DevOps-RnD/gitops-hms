# HTTPRoute - exposes hms-be via the shared hms-gateway.
# Cloudflare proxies https://api-hms-staging.evanlwp.my.id -> origin HTTP on
# the public Azure LB. VPN-only at Cloudflare (IP Access Rule on 172.20.20.0/24).
# NOTE: single-level subdomain — Cloudflare Universal SSL only covers *.evanlwp.my.id,
# nested subdomains (api.hms-staging.*) are NOT covered without ACM.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hms-be
  namespace: hms
spec:
  parentRefs:
    - name: hms-gateway
      sectionName: http
  hostnames:
    - api-hms-staging.evanlwp.my.id
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hms-be
          port: 80
