apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hms

resources:
  - ../../base
  - httproute.yaml
  # configmap.yaml + sealed-secret.yaml are BOTH Jenkins-generated on every
  # staging build. configmap = non-secret app config (PG conn knobs, bucket).
  # sealed-secret = encrypted real credentials (PGHOST/USER/PASS + firebase-key).
  - configmap.yaml
  - sealed-secret.yaml

patches:
  - path: patch-image.yaml
    target:
      kind: Deployment
      name: hms-be
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: hms-be

commonLabels:
  env: staging
