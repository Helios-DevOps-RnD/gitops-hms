# ============================================================================
# PLACEHOLDER — Jenkins overwrites this file on every staging build.
# ----------------------------------------------------------------------------
# How Jenkins produces the real file:
#   1. Pulls credentials `hms-be-pgpassword-staging`, `hms-be-firebase-key`
#      from Jenkins creds store.
#   2. Writes a raw k8s Secret YAML to /tmp (never committed).
#   3. Runs: `kubeseal --cert $STAGING_PUB_PEM --format yaml < /tmp/raw.yaml`
#   4. The sealed output replaces THIS file verbatim, then git commit + push.
#
# Why a placeholder exists at all:
#   - kustomize needs the file to exist at render time (it's listed in
#     overlays/staging/kustomization.yaml → resources).
#   - Without a placeholder, the very first ArgoCD sync would fail before
#     Jenkins ever runs and produces the real one.
#
# This placeholder is INTENTIONALLY a no-op: empty spec, empty data. The
# sealed-secrets controller will ignore it (encryptedData is empty). When
# Jenkins runs its first build, it replaces this whole file.
# ============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hms-be-secret
  namespace: hms
spec:
  encryptedData:
    FIREBASE_STORAGE_BUCKET: 
    PGDATABASE: 
    PGHOST: 
    PGPASSWORD: 
    PGPORT: 
    PGSSL: 
    PGUSER: 
  template:
    metadata:
      name: hms-be-secret
      namespace: hms
    type: Opaque
---
# Same pattern for the Firebase service account JSON — Jenkins reads the
# key file from Jenkins creds (`hms-be-firebase-key`), wraps it in a k8s
# Secret with the filename `firebase-key.json`, seals it, and overwrites
# this block. The Deployment mounts it at /app/firebase-key.json via subPath.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hms-be-firebase
  namespace: hms
spec:
  encryptedData:
    firebase-key.json: 
  template:
    metadata:
      name: hms-be-firebase
      namespace: hms
    type: Opaque