# ============================================================================
# hms-pubsub — Express Node service (PG-backed event/queue handler).
# Image:  registry.hms.internal/hms/pubsub:<git-sha>  (overlay sets the tag)
# Port:   3002
# Secrets (created by Jenkins, NOT in git):
#   - hms-pubsub-secret (envFrom)  PGHOST, PGUSER, PGPASSWORD, PGDATABASE, PGPORT
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-pubsub
  namespace: hms
  labels:
    app.kubernetes.io/name: hms-pubsub
    app.kubernetes.io/part-of: hms
    app.kubernetes.io/component: pubsub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hms-pubsub
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hms-pubsub
        app.kubernetes.io/part-of: hms
        app.kubernetes.io/component: pubsub
    spec:
      containers:
        - name: hms-pubsub
          image: registry.hms.internal/hms/pubsub:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3002"
          envFrom:
            # Out-of-band: created by Jenkins before sync.
            - secretRef:
                name: hms-pubsub-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: hms-pubsub
  namespace: hms
  labels:
    app.kubernetes.io/name: hms-pubsub
    app.kubernetes.io/part-of: hms
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hms-pubsub
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
