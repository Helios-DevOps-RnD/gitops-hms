apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hms

resources:
  - hms-pubsub.yaml
  # base/configmap.yaml dikeluarkan dari sini — tiap overlay punya
  # configmap.yaml penuh yang di-generate Jenkins (hms-pubsub-{env}-config credential).
  # File base/configmap.yaml tetap ada sebagai dokumentasi keys yang dipakai.

# `hms-pubsub-secret` lives as a SealedSecret per overlay so each env seals
# against its own cluster key. See overlays/<env>/sealed-secret.yaml.
# hms-pubsub-secret carries ONLY the real credentials (PGHOST, PGUSER, PGPASSWORD);
# non-secret config (PGPORT, PGSSL, PGDATABASE) ada di overlay configmap.yaml.
