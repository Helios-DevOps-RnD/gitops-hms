apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hms

resources:
  - hms-pubsub.yaml
  - configmap.yaml      # non-secret runtime config (overlays patch real values)

# `hms-pubsub-secret` lives as a SealedSecret per overlay so each env seals
# against its own cluster key. See overlays/<env>/sealed-secret.yaml.
# After the secret/configmap split, hms-pubsub-secret carries ONLY the real
# credentials (PGHOST, PGUSER, PGPASSWORD); the rest is in the ConfigMap.
