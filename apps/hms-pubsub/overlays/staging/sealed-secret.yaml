# hms-pubsub only needs PGPASSWORD (no Firebase).
# ============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hms-pubsub-secret
  namespace: hms
spec:
  encryptedData: {}
  template:
    metadata:
      name: hms-pubsub-secret
      namespace: hms
    type: Opaque
