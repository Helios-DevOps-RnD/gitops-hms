# ============================================================================
# PLACEHOLDER — Jenkins overwrites on every staging build.
# Sealed against the STAGING cluster's cert (staging-pub.pem in Jenkins creds).
# hms-pubsub only needs PGPASSWORD (no Firebase).
# ============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hms-pubsub-secret
  namespace: hms
spec:
  encryptedData:
    PGDATABASE: 
    PGHOST: 
    PGPASSWORD: 
    PGPORT: 
    PGSSL: 
    PGUSER: 
  template:
    metadata:
      name: hms-pubsub-secret
      namespace: hms
