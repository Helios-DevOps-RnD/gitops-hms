# HTTPRoute — exposes hms-pubsub via the shared hms-gateway.
# Cloudflare proxies https://pubsub-hms-staging.evanlwp.my.id → origin HTTP on
# the public Azure LB. The FE calls this directly from the browser via the
# CREATE_URL env var injected at container start (see hms-fe entrypoint.sh).
# VPN-only at Cloudflare (IP Access Rule on 172.20.20.0/24).
# NOTE: single-level subdomain — Cloudflare Universal SSL only covers *.evanlwp.my.id,
# nested subdomains (pubsub.hms-staging.*) are NOT covered without ACM.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hms-pubsub
  namespace: hms
spec:
  parentRefs:
    - name: hms-gateway
      sectionName: http
  hostnames:
    - pubsub-hms-staging.evanlwp.my.id
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hms-pubsub
          port: 80
