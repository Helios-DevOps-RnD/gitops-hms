apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hms

resources:
  - ../../base
  - httproute.yaml
  # SealedSecret for PGPASSWORD. Jenkins overwrites on each staging build
  # (sealed against staging-pub.pem).
  - sealed-secret.yaml

patches:
  - path: patch-image.yaml
    target:
      kind: Deployment
      name: hms-pubsub
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: hms-pubsub

commonLabels:
  env: staging
