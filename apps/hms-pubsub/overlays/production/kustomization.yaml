apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hms

resources:
  - ../../base
  - httproute.yaml
  # Full ConfigMap — Jenkins overwrites on every build (hms-pubsub-prod-config credential).
  # patch-configmap.yaml lama masih ada di folder tapi tidak lagi direferensikan.
  - configmap.yaml
  # SealedSecret: PGHOST, PGUSER, PGPASSWORD (dari hms-staging-env-file, sealed dengan prod-pubcert.pem).
  - sealed-secret.yaml

patches:
  - path: patch-image.yaml
    target:
      kind: Deployment
      name: hms-pubsub
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: hms-pubsub

commonLabels:
  env: production
