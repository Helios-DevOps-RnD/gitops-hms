# ============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hms-pubsub-secret
  namespace: hms
spec:
  encryptedData:
    PGHOST: 
    PGPASSWORD: 
    PGUSER: 
  template:
    metadata:
      name: hms-pubsub-secret
      namespace: hms
    type: Opaque
