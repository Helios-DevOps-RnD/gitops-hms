# ============================================================================
# hms-fe — Next.js 14 frontend.
# Image:  registry.hms.evanlwp.my.id/hms/fe:<git-sha>  (overlay sets the tag)
# Port:   3000
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hms-fe
  namespace: hms
  labels:
    app.kubernetes.io/name: hms-fe
    app.kubernetes.io/part-of: hms
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hms-fe
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hms-fe
        app.kubernetes.io/part-of: hms
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: hms-fe
          # Tag is patched by the overlay (Jenkins updates patch-image.yaml per build).
          image: registry.hms.evanlwp.my.id/hms/fe:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hms-fe-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      # Phase 1: assume Harbor allows anonymous pulls inside the VNet.
      # Phase 1.5: add `imagePullSecrets: [{name: harbor-regcred}]` and create
      # the secret via Jenkins (same pattern as app secrets).
---
apiVersion: v1
kind: Service
metadata:
  name: hms-fe
  namespace: hms
  labels:
    app.kubernetes.io/name: hms-fe
    app.kubernetes.io/part-of: hms
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hms-fe
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
