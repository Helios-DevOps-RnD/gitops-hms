# HTTPRoute — exposes hms-fe at https://hms.evanlwp.my.id (Cloudflare proxied).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hms-fe
  namespace: hms
spec:
  parentRefs:
    - name: hms-gateway
      sectionName: http
  hostnames:
    - hms.evanlwp.my.id
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hms-fe
          port: 80
