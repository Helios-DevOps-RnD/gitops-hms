apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hms

resources:
  - ../../base
  - httproute.yaml
  # Full ConfigMap — Jenkins overwrites on every build (hms-fe-staging-config credential).
  # patch-configmap.yaml lama masih ada di folder tapi tidak lagi direferensikan.
  - configmap.yaml

patches:
  - path: patch-image.yaml
    target:
      kind: Deployment
      name: hms-fe
  - path: patch-resources.yaml
    target:
      kind: Deployment
      name: hms-fe

commonLabels:
  env: staging
