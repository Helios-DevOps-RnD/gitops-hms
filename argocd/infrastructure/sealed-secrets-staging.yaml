# ============================================================================
# Sealed Secrets controller — STAGING cluster
# ----------------------------------------------------------------------------
# Same chart as mgmt, targets the `hms-staging` spoke. This cluster's public
# cert is what Jenkins must use when sealing secrets destined for staging:
#   kubeseal --cert staging-pub.pem --format yaml < raw.yaml > sealed.yaml
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hms
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.16.2
    helm:
      releaseName: sealed-secrets
      values: |
        fullnameOverride: sealed-secrets-controller
        keyrenewperiod: 720h
  destination:
    name: hms-staging
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
