# ArgoCD Application — NGINX Gateway Fabric on the STAGING cluster.
# Sync wave -10: after namespaces, before workloads (which create HTTPRoutes).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hms
  source:
    repoURL: https://github.com/Helios-DevOps-RnD/gitops-hms.git
    targetRevision: main
    path: infrastructure/nginx-gateway/overlays/staging
  destination:
    name: hms-staging
    namespace: nginx-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Server-side apply: large CRDs (>262 KB) won't fit in a client-side
      # last-applied annotation, and SSA also handles "already exists" by
      # patching instead of erroring out. ArgoCD becomes the field manager.
      - ServerSideApply=true
      # CRDs and CRs ship in the same kustomize render. Without this flag
      # ArgoCD's pre-apply dry-run rejects Gateway/GatewayClass/NginxProxy/
      # NginxGateway because their CRDs haven't been installed yet on this
      # pass. The flag tells ArgoCD to skip dry-run for those, apply CRDs
      # first, then re-converge the CRs in the next sync iteration.
      - SkipDryRunOnMissingResource=true
