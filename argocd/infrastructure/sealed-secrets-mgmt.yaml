# ============================================================================
# Sealed Secrets controller — MGMT cluster
# ----------------------------------------------------------------------------
# Installs bitnami-labs/sealed-secrets into the `sealed-secrets` namespace on
# the mgmt cluster. Each cluster runs its own controller with its own keypair
# (auto-generated on first install, stored in a Secret inside the cluster
# labelled sealedsecrets.bitnami.com/sealed-secrets-key=active).
#
# Jenkins fetches the PUBLIC cert once per cluster:
#   kubeseal --fetch-cert --controller-namespace sealed-secrets > mgmt-pub.pem
# …and stores mgmt-pub.pem / staging-pub.pem / prod-pub.pem in Jenkins creds.
#
# sync-wave: -10 so the controller & CRD come up BEFORE any SealedSecret
# resource tries to sync in workload Applications.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-mgmt
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hms
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.16.2
    helm:
      releaseName: sealed-secrets
      values: |
        fullnameOverride: sealed-secrets-controller
        # Keep the default keypair rotation behaviour (30 days). Old keys stay
        # in the cluster so previously-sealed secrets can still be decrypted.
        keyrenewperiod: 720h
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
