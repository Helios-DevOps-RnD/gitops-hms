# ArgoCD Application — NGINX Gateway Fabric on the PROD cluster.
# Phase 2: enable when prod cluster is registered with ArgoCD.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-production
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hms
  source:
    repoURL: https://github.com/Helios-DevOps-RnD/gitops-hms.git
    targetRevision: main
    path: infrastructure/nginx-gateway/overlays/production
  destination:
    name: hms-prod
    namespace: nginx-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Server-side apply handles "already exists" by patching, and is required
      # for the large NGF CRDs that exceed the 262KB client-side annotation
      # limit. ArgoCD becomes the field manager.
      - ServerSideApply=true
      # CRDs and CRs ship in the same render — skip dry-run for resources whose
      # CRDs aren't installed yet so ArgoCD can apply CRDs first then converge.
      - SkipDryRunOnMissingResource=true
