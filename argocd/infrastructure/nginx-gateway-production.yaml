# ArgoCD Application — NGINX Gateway Fabric on the PROD cluster.
# Phase 2: enable when prod cluster is registered with ArgoCD.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-production
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hms
  source:
    repoURL: https://github.com/Helios-DevOps-RnD/gitops-hms.git
    targetRevision: main
    path: infrastructure/nginx-gateway/overlays/production
  destination:
    name: hms-prod
    namespace: nginx-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
