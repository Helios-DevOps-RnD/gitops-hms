# ============================================================================
# ArgoCD Application — Mimir (metrics store) on the MGMT cluster.
# ----------------------------------------------------------------------------
# Single-binary monolithic deployment via plain K8s manifests.
# The mimir-distributed Helm chart's deploymentMode: monolithic was never
# released (PR #4858 abandoned), so we run the binary directly.
#
# After first sync, get the LB IP:
#   kubectl -n monitoring get svc mimir-lb
# Then update:
#   infrastructure/alloy/values-staging.yaml   → mimir_endpoint
#   infrastructure/alloy/values-production.yaml → mimir_endpoint
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-mimir-mgmt
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hms
  source:
    repoURL: https://github.com/Helios-DevOps-RnD/gitops-hms.git
    targetRevision: main
    path: infrastructure/monitoring/mimir
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
