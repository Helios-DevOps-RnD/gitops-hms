# ============================================================================
# Sealed Secrets controller — PROD cluster (Phase 2)
# ----------------------------------------------------------------------------
# Same chart as mgmt/staging, targets the `hms-prod` spoke. This cluster's
# public cert is what Jenkins must use for prod seals:
#   kubeseal --cert prod-pub.pem --format yaml < raw.yaml > sealed.yaml
#
# NOTE: destination `hms-prod` must exist in ArgoCD before this syncs —
# register it via `./bootstrap/2-register-clusters.sh` (uncomment prod block).
# Until then, this Application will stay in `Unknown` state, which is fine.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-production
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hms
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.16.2
    helm:
      releaseName: sealed-secrets
      values: |
        fullnameOverride: sealed-secrets-controller
        keyrenewperiod: 720h
  destination:
    name: hms-prod
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
